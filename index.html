<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="google-site-verification" content="0Ykh3F9cPW7LilRvxF8gGSoRVT-HJQ0EvzR2JDe1w7g" />
    <meta charset="UTF-8">
    <title>CS2 Envanter Değer Hesaplayıcı</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-color: #16213e;
            --accent-color: #e94560;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 12px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #0f3460;
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background: #0f3460;
            display: none;
        }

        .total-price {
            font-size: 28px;
            color: #4e9f3d;
            font-weight: bold;
            margin: 10px 0;
        }

        .item-list {
            text-align: left;
            margin-top: 15px;
            font-size: 14px;
            border-top: 1px solid #16213e;
            padding-top: 10px;
        }

        .ad-space {
            margin-top: 30px;
            padding: 15px;
            background: #252525;
            border: 1px dashed #666;
            color: #888;
            font-size: 12px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CS2 Inventory Calculator</h1>
    <p>Steam ID veya Kullanıcı Adınızı yazarak envanter değerini hesaplayın (Demo sürümüdür).</p>
    
    <div class="input-group">
        <input type="text" id="steamInput" placeholder="Örn: SteamID64 veya Kullanıcı Adı">
    </div>
    
    <button onclick="hesaplaEnvanter()">Envanteri Hesapla</button>

    <div class="result-box" id="resultBox">
        <h3>Hesaplama Başarılı!</h3>
        <p>Bulunan Skin Sayısı: <span id="skinCount">0</span></p>
        <div class="total-price" id="totalPrice">$0.00</div>
        
        <div class="item-list" id="itemList">
            </div>
    </div>

    <div class="ad-space">
        REKLAM ALANI (Google AdSense)
    </div>
</div>

<script>
// Gerçek dünyada fiyatları anlık çekeceğimiz global değişken
let guncelCs2Fiyatlari = {};

// Site açılır açılmaz arka planda fiyatları API'den çeken fonksiyon
async function fiyatlariYukle() {
    try {
        // Ücretsiz ve herkese açık örnek bir CS2 fiyat API'si (Temsili URL)
        // Gerçek projede: https://bum.com/api/v1/prices veya steamwebapi gibi bir servis kullanılır
        const response = await fetch('https://raw.githubusercontent.com/bybaf/CS2-API/main/prices.json'); 
        guncelCs2Fiyatlari = await response.json();
        console.log("CS2 Fiyatları başarıyla güncellendi!");
    } catch (error) {
        console.error("Fiyatlar çekilirken hata oluştu:", error);
        // Eğer API çökerse yedek fiyatları devreye sokalım
        guncelCs2Fiyatlari = {
            "AK-47 | Redline (Field-Tested)": 22.50,
            "M4A1-S | Printstream (Field-Tested)": 68.00
        };
    }
}

// Sayfa yüklenir yüklenir yüklenmez fiyatları çekmeye başla
window.onload = fiyatlariYukle;

// Kullanıcı butona bastığında çalışacak gerçek hesaplama fonksiyonu
async function hesaplaEnvanter() {
    const steamInput = document.getElementById("steamInput").value.trim();
    
    if(steamInput === "") {
        alert("Lütfen bir Steam ID veya kullanıcı adı girin!");
        return;
    }

    // 1. ADIM: Kullanıcının envanterini Steam API'sinden çekiyoruz (Temsili mantık)
    // Gerçekte Steam gizlilik ayarlarına göre tarayıcıdan direkt çekmeye izin vermeyebilir, 
    // bu yüzden bir proxy veya üçüncü parti aracı kullanacağız.
    
    // Şimdilik kullanıcının envanterinde bu iki itemin olduğunu varsayalım:
    const kullaniciSkins = [
        "AK-47 | Redline (Field-Tested)",
        "M4A1-S | Printstream (Field-Tested)"
    ];

    let toplamDeger = 0;
    let itemListHTML = "<strong>Envanterinizdeki Eşyalar:</strong><br>";

    // 2. ADIM: Çektiğimiz envanterdeki itemleri, API'den gelen fiyatlarla eşleştiriyoruz
    kullaniciSkins.forEach(item => {
        // API'den gelen fiyatı al, yoksa 0 kabul et
        const fiyat = guncelCs2Fiyatlari[item] || 0; 
        toplamDeger += fiyat;
        itemListHTML += `• ${item} - <strong>$${fiyat.toFixed(2)}</strong><br>`;
    });

    // 3. ADIM: Sonuçları ekrana yazdırma
    document.getElementById("skinCount").innerText = kullaniciSkins.length;
    document.getElementById("totalPrice").innerText = `$${toplamDeger.toFixed(2)}`;
    document.getElementById("itemList").innerHTML = itemListHTML;
    
    document.getElementById("resultBox").style.display = "block";
}
</script>
